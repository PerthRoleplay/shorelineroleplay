<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - Page Under Development</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1e293b, #0f172a);
      color: #e2e8f0;
    }

    .container {
      text-align: center;
      padding: 40px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
      max-width: 500px;
      width: 90%;
    }

    h1 {
      font-size: 72px;
      margin-bottom: 10px;
      color: #38bdf8;
    }

    h2 {
      font-size: 24px;
      margin-bottom: 20px;
      color: #f1f5f9;
    }

    p {
      font-size: 16px;
      margin-bottom: 30px;
      color: #cbd5f5;
    }

    .btn {
      display: inline-block;
      padding: 12px 24px;
      border-radius: 10px;
      text-decoration: none;
      background: #38bdf8;
      color: #0f172a;
      font-weight: 600;
      transition: 0.3s ease;
    }

    .btn:hover {
      background: #0ea5e9;
      transform: translateY(-2px);
    }

    .small {
      margin-top: 20px;
      font-size: 13px;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <h2>Page Under Development</h2>
    <p>
      The page you're looking for isn't available just yet. We're currently working on it and it should be live soon.
    </p>

    <a href="/" class="btn">Return Home</a>

    <div class="small">
      If you believe this is an error, please check back later.
    </div>
  </div>
</body>
</html>
